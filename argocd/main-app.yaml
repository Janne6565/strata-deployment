apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strata
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/janne6565/strata-deployment.git
    targetRevision: main
    path: overlays/main
  destination:
    server: https://kubernetes.default.svc
    namespace: strata
  syncPolicy:
    # Fully automated: any commit to main (CI tag bump or manual manifest edit)
    # is reconciled onto the cluster with no manual step.
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
