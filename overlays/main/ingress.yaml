apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: strata-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Real-IP $remote_addr;
spec:
  tls:
    - hosts:
        - strata.jannekeipert.de
      secretName: strata-tls
  rules:
    - host: strata.jannekeipert.de
      http:
        paths:
          # API first — backend serves everything under /api/v1/...
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          # Everything else is the static SPA (same origin → no CORS).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
