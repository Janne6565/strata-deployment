apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Single environment. Everything lives in the `strata` namespace.
namespace: strata
resources:
  - ../../base
  - ingress.yaml
# CI (backend/frontend repos) rewrites these tags via
# `kustomize edit set image` and pushes — ArgoCD then auto-syncs. The values
# below are placeholders until the first CI run publishes an image.
images:
  - name: ghcr.io/janne6565/strata-backend
    newName: ghcr.io/janne6565/strata-backend
    newTag: main-457cc88
  - name: ghcr.io/janne6565/strata-frontend
    newName: ghcr.io/janne6565/strata-frontend
    newTag: main-4f37e2e
