# Holds the scheduled pg_dump backups written by the backend: Strata's own DB plus one
# subdirectory per discovered PostgreSQL datasource, each with tiered retention (~6 dumps).
# ReadWriteOnce is sufficient — only the single backend replica mounts it. Sized for many
# databases; in-place expansion needs a StorageClass with allowVolumeExpansion, otherwise
# recreate the PVC (backups are non-critical and regenerate on the next scheduled run).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: strata-backend-backups
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
