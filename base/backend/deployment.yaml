apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  # Single replica: the in-app @Scheduled backup job (BackupService) runs in every
  # replica, so scaling out would produce duplicate backups — add a distributed lock
  # (e.g. ShedLock) before raising this. The backups PVC below is ReadWriteOnce anyway.
  replicas: 1
  # Recreate (not RollingUpdate): the backups PVC is ReadWriteOnce, so a new pod on a
  # different node cannot mount it while the old pod still holds it — a rolling update
  # would deadlock. Tear the old pod down first.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Dedicated ServiceAccount scoped to the cluster-read RBAC the discovery
      # engine needs (see rbac.yaml). Never the default ServiceAccount.
      serviceAccountName: strata-backend
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: ghcr.io/janne6565/strata-backend:placeholder
          ports:
            - name: http
              containerPort: 8080
          # Non-secret config (DB URL/user, owner username) from a ConfigMap;
          # passwords + JWT secret from a Secret (see docs/secrets-required.md).
          env:
            # Load the discovery detector rules mounted at /config/application.yaml
            # (merged over the packaged application.yaml).
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: optional:/config/
          envFrom:
            - configMapRef:
                name: strata-backend-config
            - secretRef:
                name: strata-backend-secrets
          # Spring Boot Actuator health probes (liveness/readiness groups). The
          # health endpoints are exposed over the main HTTP port and permitted
          # unauthenticated in SecurityConfig.
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Writable /tmp because the root filesystem is read-only (Spring
            # Boot / Tomcat extract work files here).
            - name: tmp
              mountPath: /tmp
            # Discovery detector rules (read-only).
            - name: discovery-config
              mountPath: /config
              readOnly: true
            # Scheduled database backups. Writable despite the read-only root FS;
            # fsGroup: 1000 (pod securityContext) makes the PVC group-writable.
            - name: backups
              mountPath: /backups
      volumes:
        - name: tmp
          emptyDir: {}
        - name: discovery-config
          configMap:
            name: strata-backend-discovery
        - name: backups
          persistentVolumeClaim:
            claimName: strata-backend-backups
