# Per-environment discovery detector rules (ARCHITECTURE.md §8), mounted into the
# backend as an additional Spring config file (see deployment.yaml:
# SPRING_CONFIG_ADDITIONAL_LOCATION=/config/). Each detector maps a workload
# container image (regex over repository:tag) to an engine driver, and names the
# env vars that carry each credential field — Strata resolves them by walking the
# matched workload's container env (literal / secretKeyRef / configMapKeyRef /
# envFrom). Host+port come from the workload's Service, not from here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: strata-backend-discovery
data:
  application.yaml: |
    strata:
      discovery:
        detectors:
          # PostgreSQL — official `postgres` image convention. Covers every
          # postgres workload in the cluster (cosy*, mailservice, medals, n8n,
          # project-manager, strata's own state DB, ...).
          - id: postgres
            driver: postgresql
            match:
              ref: "postgres"
              ports: [5432]
            credentials:
              env:
                username: POSTGRES_USER
                password: POSTGRES_PASSWORD
                database: POSTGRES_DB

          # Redis — listed on discovery; the stock image often has no auth env,
          # so credentials may resolve as "unresolved" and need a manual override.
          - id: redis
            driver: redis
            match:
              ref: "redis"
              ports: [6379]
            credentials:
              env:
                password: REDIS_PASSWORD

          # InfluxDB 2.x authenticates with an API token against an org+bucket, so
          # the engine maps username->org, password->token, database->bucket.
          # The admin token is usually NOT in the pod env (auto-generated at init),
          # so `password` stays UNRESOLVED and the token must be entered as a
          # manual override; org+bucket auto-resolve from the init env.
          - id: influxdb
            driver: influxdb
            match:
              ref: "influxdb"
              ports: [8086]
            credentials:
              env:
                username: DOCKER_INFLUXDB_INIT_ORG
                password: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
                database: DOCKER_INFLUXDB_INIT_BUCKET

          # CockroachDB speaks the PostgreSQL wire protocol (port 26257). Standard
          # cockroach image env: COCKROACH_USER/PASSWORD/DATABASE.
          - id: cockroachdb
            driver: postgresql
            match:
              ref: "cockroach"
              ports: [26257]
            credentials:
              env:
                username: COCKROACH_USER
                password: COCKROACH_PASSWORD
                database: COCKROACH_DATABASE

          # Grafana Loki (HTTP API on :3100). Optional HTTP basic auth via
          # username/password; cosy-loki runs auth-less, so no credentials are
          # mapped and it connects anonymously. Add a `credentials.env` block
          # (username/password) for a Loki behind basic auth.
          - id: loki
            driver: loki
            match:
              ref: "grafana/loki"
              ports: [3100]
